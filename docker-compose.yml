version: "3.9"

services:
  # ── PostgreSQL with pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ikrs_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ikrs_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ikrs_pass}
      POSTGRES_DB: ${DB_NAME:-ikrs}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ikrs_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ikrs_api
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  # ── Streamlit UI ──────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ikrs_ui
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      - api

volumes:
  pgdata:
